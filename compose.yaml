name: soundofmemories

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 512m
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change-me-in-prod}
      DEFAULT_URI: ${DEFAULT_URI:-http://127.0.0.1:8050}
      DATABASE_URL: mysql://SOM:SOM@database:3306/SOM?serverVersion=10.11.2-MariaDB&charset=utf8mb4
    volumes:
      - ./:/var/www/html
    depends_on:
      database:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 128m
    ports:
      - "127.0.0.1:${HTTP_PORT:-8050}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mariadb:10.11
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 512m
    command:
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=25
      - --performance-schema=OFF
      - --key-buffer-size=16M
      - --thread-cache-size=8
      - --skip-name-resolve
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-SOM}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-SOM}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_USER: ${MARIADB_USER:-SOM}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw
      # - ./docker/db/data:/var/lib/mysql:rw

volumes:
  database_data:
