services:
  database:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${DATABASE_FORWARD_PORT:-13307}:3306"

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MAILER_SMTP_PORT:-11026}:1025"
      - "127.0.0.1:${MAILER_HTTP_PORT:-18026}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
